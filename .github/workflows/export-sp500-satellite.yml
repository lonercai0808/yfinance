name: Export S&P 500 satellite history

on:
  workflow_dispatch:
    inputs:
      start:
        description: Yahoo start date (warm-up included)
        required: true
        default: "2018-07-01"
      end:
        description: Yahoo-exclusive end date
        required: true
        default: "2026-07-18"
      retries:
        description: Attempts per symbol
        required: true
        default: "3"
      max_symbols:
        description: Per-shard probe limit; 0 means full shard
        required: true
        default: "0"
      symbols_file:
        description: Repository-relative CSV with symbol and yahoo_symbol columns
        required: true
        default: "research/satellite_symbol_map.csv"
  push:
    branches:
      - codex-sp500-satellite-export
    paths:
      - .github/workflows/export-sp500-satellite.yml
      - research/export_sp500_satellite.py
      - research/satellite_symbol_map.csv

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fork and exporter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          # The fork's price-repair path imports scipy lazily at runtime.
          python -m pip install scipy

      - name: Export shard
        env:
          START_DATE: ${{ github.event.inputs.start || '2018-07-01' }}
          END_DATE: ${{ github.event.inputs.end || '2026-07-18' }}
          RETRIES: ${{ github.event.inputs.retries || '3' }}
          MAX_SYMBOLS: ${{ github.event.inputs.max_symbols || '0' }}
          SYMBOLS_FILE: ${{ github.event.inputs.symbols_file || 'research/satellite_symbol_map.csv' }}
        run: |
          python research/export_sp500_satellite.py \
            --symbols-file "$SYMBOLS_FILE" \
            --start "$START_DATE" \
            --end "$END_DATE" \
            --shard-index ${{ matrix.shard }} \
            --shard-count 4 \
            --retries "$RETRIES" \
            --pause 0.35 \
            --max-symbols "$MAX_SYMBOLS" \
            --out-dir "exports/sp500_satellite_shard_${{ matrix.shard }}"

      - name: Upload shard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sp500-satellite-shard-${{ matrix.shard }}
          path: exports/sp500_satellite_shard_${{ matrix.shard }}
          retention-days: 1
          if-no-files-found: error
