name: Export strategy history

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Data scope
        required: true
        type: choice
        default: probe
        options:
          - probe
          - missing_2019_plus
      start:
        description: Inclusive start date
        required: true
        default: "2026-06-01"
      end:
        description: Exclusive end date
        required: true
        default: "2026-07-16"

permissions:
  contents: read

concurrency:
  group: export-strategy-history
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install this yfinance fork
        run: python -m pip install -e . scipy
      - name: Export a rate-limited sample
        run: >-
          python research/export_strategy_history.py
          --scope "${{ inputs.scope }}"
          --start "${{ inputs.start }}"
          --end "${{ inputs.end }}"
          --out-dir yahoo-export
      - name: Upload short-lived research artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yahoo-strategy-history-${{ github.run_id }}
          path: yahoo-export/
          if-no-files-found: error
          retention-days: 1
